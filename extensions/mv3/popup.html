<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 350px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    h1 {
      margin: 0 0 20px 0;
      font-size: 16px;
      font-weight: 600;
    }

    article {
      margin-bottom: 20px;
      padding: 12px;
      border: 1px solid #e1e5e9;
      border-radius: 8px;
    }

    article h2 {
      margin: 0 0 12px 0;
      font-size: 14px;
      font-weight: 600;
      color: #0066cc;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      cursor: pointer;
    }

    label input {
      margin-right: 8px;
      transform: scale(1.1);
    }

    button {
      width: 100%;
      padding: 10px;
      background: #0066cc;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    button:hover {
      background: #0052a3;
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    #status {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>

<body>
  <h1 id="title">Loading...</h1>

  <div id="sections"></div>

  <button id="updateBtn">Update Style</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>

</html>
